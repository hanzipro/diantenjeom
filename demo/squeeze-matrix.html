<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>diantenjeom — pair-squeeze matrix probe</title>
<style>
  @import "./diantenjeom.css";
  html, body { margin: 0; }
  /* The measuring stage. font-family / writing-mode are set from JS per the
     ?variant&style&dir query. EM is fixed at 100px for clean numbers. */
  #stage {
    font-size: 100px;
    line-height: 2;
    white-space: nowrap;
    position: absolute;
    visibility: hidden;          /* measured, not shown */
  }
  #stage.notrim { text-spacing-trim: space-all; }  /* true "no squeeze" baseline */
  #stage.trim   { text-spacing-trim: trim-start; }
  #stage.vert   { writing-mode: vertical-rl; -webkit-writing-mode: vertical-rl; }

  /* Visible status / result, so the page is also human-openable. */
  #status { font: 14px ui-monospace, monospace; padding: 0 1rem; white-space: pre-wrap; }
  #RESULT { display: none; }

  /* Config switcher for manual inspection. */
  #nav { font: 13px ui-monospace, monospace; padding: .6rem 1rem; line-height: 2; border-bottom: 1px solid #eee; }
  #nav a { margin-right: .35rem; text-decoration: none; padding: 1px 6px; border: 1px solid #ccc; border-radius: 4px; color: #333; }
  #nav a.cur { background: #222; color: #fff; border-color: #222; }

  /* Pair grids — squeezed and not-squeezed. */
  .grid-label { font: 12px ui-monospace, monospace; color: #888; padding: .5rem 1rem .2rem; }
  #grid, #grid-no { display: flex; flex-wrap: wrap; gap: .4rem; padding: .5rem 1rem 1rem; }
  #grid .cell, #grid-no .cell { border: 1px solid #eee; border-radius: 5px; padding: .25rem .4rem; display: flex; flex-direction: column; align-items: center; }
  #grid-no .cell { border-color: #f5e0e0; background: #fffafa; }
  #grid .pair, #grid-no .pair { font-size: 34px; text-spacing-trim: space-first; line-height: 1.2; }
  #grid.vert .pair, #grid-no.vert .pair { writing-mode: vertical-rl; -webkit-writing-mode: vertical-rl; }
  #grid .amt, #grid-no .amt { font: 10px ui-monospace, monospace; color: #aaa; margin-top: 2px; }
</style>
</head>
<body>
<nav id="nav"></nav>
<div id="stage"></div>
<div id="status">measuring…</div>
<pre id="RESULT"></pre>
<div class="grid-label" id="label-yes" style="display:none"></div>
<div id="grid"></div>
<div class="grid-label" id="label-no" style="display:none"></div>
<div id="grid-no"></div>

<script>
  const EM = 100;
  const THRESHOLD = 0.05;   // savedEm below this counts as "no squeeze" (sub-px noise)

  // Kinsoku-relevant classes (cross-producted), plus neutral controls that
  // should NOT squeeze (negative cases).
  const OPEN    = ["「","『","《","〈","（","〔","【","〖","〘","〚","［","｛"];
  const CLOSE   = ["」","』","》","〉","）","〕","】","〗","〙","〛","］","｝"];
  const PERIOD  = ["。","．"];
  const COMMA   = ["、","，"];
  const COLON   = ["：","；"];
  const BANG    = ["！","？"];
  const MIDDOT  = ["・","·"];
  const QUOTE   = ["“","”","‘","’"];
  const CONTROL = ["—","…","／","●","永"];   // neutral controls (expect ~0)
  const CHARS = [...OPEN, ...CLOSE, ...PERIOD, ...COMMA, ...COLON,
                 ...BANG, ...MIDDOT, ...QUOTE, ...CONTROL];

  // Read from hash first (survives `serve`'s clean-URL redirect, which drops
  // the query string), then query string (used by the headless driver).
  const hashP = new URLSearchParams(location.hash.replace(/^#/, ""));
  const queryP = new URLSearchParams(location.search);
  const param = (k, d) => (hashP.get(k) || queryP.get(k) || d).toLowerCase();
  const variant = param("variant", "jis");   // jis|moe|gb|kv
  const style   = param("style", "sans");     // sans|serif
  const dir     = param("dir", "h");          // h|v
  // Switching config via the nav re-runs the measurement.
  addEventListener("hashchange", () => location.reload());

  const FAMILY = `Diantenjeom ${style[0].toUpperCase()}${style.slice(1)} ${variant.toUpperCase()}`;
  const FALLBACK = style === "serif"
    ? "'Hiragino Mincho ProN', 'Yu Mincho', serif"
    : "'Hiragino Sans', 'Yu Gothic', sans-serif";

  const stage = document.getElementById("stage");
  stage.style.fontFamily = `'${FAMILY}', ${FALLBACK}`;
  if (dir === "v") stage.classList.add("vert");

  // Config switcher (14 configs: kv is vertical-only). Doesn't need fonts.
  (function buildNav() {
    const all = [];
    for (const v of ["jis", "moe", "gb", "kv"])
      for (const s of ["sans", "serif"])
        for (const d of ["h", "v"])
          if (!(v === "kv" && d === "h")) all.push([v, s, d]);
    const nav = document.getElementById("nav");
    for (const [v, s, d] of all) {
      const a = document.createElement("a");
      a.href = `#variant=${v}&style=${s}&dir=${d}`;
      a.textContent = `${v.toUpperCase()} ${s} ${d === "v" ? "↕" : "↔"}`;
      if (v === variant && s === style && d === dir) a.className = "cur";
      nav.appendChild(a);
    }
  })();

  // Measure the inline extent of the punctuation pair, kept mid-line by a
  // leading/trailing Han so neither glyph sits at the line start/end.
  function extent(a, b, trim) {
    stage.className = (dir === "v" ? "vert " : "") + (trim ? "trim" : "notrim");
    stage.innerHTML = '永<span class="probe"></span>永';
    const probe = stage.querySelector(".probe");
    probe.textContent = a + b;
    const r = probe.getBoundingClientRect();
    return dir === "v" ? r.height : r.width;
  }

  function savedEm(a, b) {
    const natural  = extent(a, b, false);
    const squeezed = extent(a, b, true);
    return (natural - squeezed) / EM;
  }

  (async () => {
    try {
      await document.fonts.load(`${EM}px '${FAMILY}'`, CHARS.join(""));
    } catch (e) { /* fall through — measurement will reveal a load failure */ }
    await document.fonts.ready;

    const squeeze = {};
    let tested = 0;
    for (const a of CHARS) {
      for (const b of CHARS) {
        tested++;
        const s = savedEm(a, b);
        if (s >= THRESHOLD) squeeze[a + b] = Math.round(s * 100) / 100;
      }
    }

    const result = {
      meta: {
        variant, style, dir,
        family: FAMILY,
        em: EM,
        chars: CHARS.length,
        pairs_tested: tested,
        pairs_squeezed: Object.keys(squeeze).length,
        font_loaded: document.fonts.check(`${EM}px '${FAMILY}'`),
      },
      squeeze,
    };

    document.getElementById("RESULT").textContent = JSON.stringify(result);
    document.getElementById("status").textContent =
      `${FAMILY} · ${dir === "v" ? "vertical" : "horizontal"}\n` +
      `font loaded: ${result.meta.font_loaded}\n` +
      `pairs tested: ${tested} · squeezed: ${result.meta.pairs_squeezed}`;

    // Build a set of all non-squeezing pairs (excluding same-char control pairs).
    const noSqueeze = {};
    for (const a of CHARS) {
      for (const b of CHARS) {
        const pair = a + b;
        if (!squeeze[pair]) noSqueeze[pair] = 0;
      }
    }

    // Render squeezing pairs.
    const grid = document.getElementById("grid");
    grid.style.fontFamily = `'${FAMILY}', ${FALLBACK}`;
    if (dir === "v") grid.classList.add("vert");
    const entries = Object.entries(squeeze)
      .sort((x, y) => (y[1] - x[1]) || x[0].localeCompare(y[0]));
    document.getElementById("label-yes").style.display = "";
    document.getElementById("label-yes").textContent =
      `Squeezing — ${entries.length} pairs`;
    for (const [pair, amt] of entries) {
      const cell = document.createElement("div");
      cell.className = "cell";
      const p = document.createElement("span");
      p.className = "pair";
      p.textContent = pair;
      const a = document.createElement("span");
      a.className = "amt";
      a.textContent = amt;
      cell.append(p, a);
      grid.appendChild(cell);
    }

    // Render non-squeezing pairs.
    const gridNo = document.getElementById("grid-no");
    gridNo.style.fontFamily = `'${FAMILY}', ${FALLBACK}`;
    if (dir === "v") gridNo.classList.add("vert");
    const noEntries = Object.keys(noSqueeze).sort((a, b) => a.localeCompare(b));
    document.getElementById("label-no").style.display = "";
    document.getElementById("label-no").textContent =
      `Not squeezing — ${noEntries.length} pairs`;
    for (const pair of noEntries) {
      const cell = document.createElement("div");
      cell.className = "cell";
      const p = document.createElement("span");
      p.className = "pair";
      p.textContent = pair;
      const a = document.createElement("span");
      a.className = "amt";
      a.textContent = "0";
      cell.append(p, a);
      gridNo.appendChild(cell);
    }

    // Cross-validate display rendering per character-class group.
    // For each group: pick one representative squeezing pair and one non-squeezing
    // pair, re-measure at the display font-size (34px), compare against the actual
    // rendered .pair element in the respective grid.
    //
    // Result: "✓ all N passed" in status, or per-failing-check details in crimson.
    (function assertDisplayGroups() {
      const GROUPS = [
        ["OPEN",   OPEN],
        ["CLOSE",  CLOSE],
        ["PERIOD", PERIOD],
        ["COMMA",  COMMA],
        ["COLON",  COLON],
        ["BANG",   BANG],
        ["MIDDOT", MIDDOT],
        ["QUOTE",  QUOTE],
      ];

      const pairEls = new Map(
        [...grid.querySelectorAll(".pair")].map(el => [el.textContent, el])
      );
      const noEls = new Map(
        [...document.getElementById("grid-no").querySelectorAll(".pair")].map(el => [el.textContent, el])
      );

      function measure34natural(a, b) {
        stage.style.fontSize = "34px";
        const n = extent(a, b, false);
        const t = extent(a, b, true);
        stage.style.fontSize = "";
        return { n, t };
      }

      function displayedSize(el) {
        const r = el.getBoundingClientRect();
        return dir === "v" ? r.height : r.width;
      }

      // sq check: displayed must be closer to t (trimmed) than n (natural).
      // Skip if signal n-t < 0.5px — too small to distinguish at 34px.
      function checkSq(pair, pairEl) {
        const [a, b] = [...pair];
        const { n, t } = measure34natural(a, b);
        if (n - t < 0.5) return { skip: true };
        const displayed = displayedSize(pairEl);
        const ok = Math.abs(displayed - t) <= Math.abs(displayed - n);
        return { ok, skip: false, pair, expectSqueeze: true, n, t, displayed };
      }

      // no-sq check: displayed must not be meaningfully smaller than natural.
      // Uses only n (natural baseline); t is irrelevant (≈ n for these pairs).
      // Fail if natural - displayed > 0.5px (i.e., display is squeezing when it shouldn't).
      function checkNoSq(pair, pairEl) {
        const [a, b] = [...pair];
        stage.style.fontSize = "34px";
        const n = extent(a, b, false);
        stage.style.fontSize = "";
        const displayed = displayedSize(pairEl);
        const ok = n - displayed <= 0.5;
        return { ok, skip: false, pair, expectSqueeze: false, n, t: null, displayed };
      }

      const results = [];
      for (const [name, group] of GROUPS) {
        const sqEntry = entries.find(([p]) => group.includes(p[0]) || group.includes(p[1]));
        if (sqEntry && pairEls.has(sqEntry[0]))
          results.push({ name, ...checkSq(sqEntry[0], pairEls.get(sqEntry[0])) });

        // Exclude CONTROL chars (—, …, ／, ●, 永) from no-sq selection:
        // they sort early in Unicode so they'd dominate every group, and
        // their mid-line probe context doesn't match the display's line-start context.
        const noKey = noEntries.find(p =>
          (group.includes(p[0]) || group.includes(p[1])) &&
          !CONTROL.includes(p[0]) && !CONTROL.includes(p[1])
        );
        if (noKey && noEls.has(noKey))
          results.push({ name, ...checkNoSq(noKey, noEls.get(noKey)) });
      }

      const checked = results.filter(r => !r.skip);
      const failed  = checked.filter(r => !r.ok);
      const statusEl = document.getElementById("status");

      if (failed.length === 0) {
        const passList = checked.map(r =>
          `  ✓ ${r.name.padEnd(7)} ${r.pair}  ${r.expectSqueeze ? "sq" : "no-sq"}`
        ).join("\n");
        statusEl.textContent +=
          `\n\ndisplay validation · ${checked.length} checks · all passed ✓\n` + passList;
      } else {
        const header =
          `display validation · ${checked.length} checks · ${failed.length} FAILED ⛔`;
        const detail = failed.map(r => {
          const kind = r.expectSqueeze ? "sq" : "no-sq";
          const nums = r.expectSqueeze
            ? `nat=${r.n.toFixed(1)} trim=${r.t.toFixed(1)} disp=${r.displayed.toFixed(1)}`
            : `nat=${r.n.toFixed(1)} disp=${r.displayed.toFixed(1)}`;
          const verdict = r.expectSqueeze
            ? "displayed ≈ natural (not squeezed)"
            : "displayed < natural (unexpectedly squeezed)";
          return `  ✗ ${r.name.padEnd(7)} ${r.pair}  ${kind}  ${nums}  ← ${verdict} (check space-first on #grid .pair)`;
        });
        statusEl.style.color = "crimson";
        statusEl.textContent += "\n\n" + [header, ...detail].join("\n");
        console.error("assertDisplayGroups:\n" + [header, ...detail].join("\n"));
      }
    })();

    document.title = "DONE " + document.title;
  })();
</script>
</body>
</html>
