name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build deps
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src scripts tests

      - name: Build fonts
        run: python scripts/build_fonts.py

      - name: Structural tests
        run: pytest -q

      - name: Font QA (fontbakery)
        # Advisory for now: the universal profile flags subsetting-specific
        # noise (missing Latin coverage, whitespace glyphs) that doesn't
        # apply to a punctuation-only font. Surfaces real issues (OFL/license
        # metadata, name-table hygiene) without blocking. Tighten via
        # --exclude-checkid once the report is triaged, then drop the `|| true`.
        run: |
          fontbakery check-universal \
            --ghmarkdown fontbakery-report.md \
            dist/fonts/*.otf || true
          cat fontbakery-report.md || true

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
