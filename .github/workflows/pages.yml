name: pages

# Deploys demo/ (static HTML, no build step) to GitHub Pages.
# Served at https://hanzipro.github.io/diantenjeom/ — all demo links are
# relative, so the project subpath needs no base rewriting.

on:
  push:
    branches: [main]
    paths:
      - "demo/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: demo

      - id: deployment
        uses: actions/deploy-pages@v4
